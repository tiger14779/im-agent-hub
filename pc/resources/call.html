<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<!--
  LiveKit audio bridge — no UI, reports events via console.log("call:cmd:data").
  Variables are injected by VoiceCallWindow.qml as a <script> block in <head>:
    window.__callToken   - LiveKit JWT
    window.__callWsUrl   - wss://livekit server URL
    window.__callMyId    - local participant identity
    window.__livekitSrc  - "/lk.js" (relative, resolved against server base URL)
  Using <script type="module"> so top-level await works and module imports are
  handled correctly by Chromium without CORS issues (same-origin via base URL).
-->
<script type="module">
var token = window.__callToken;
var wsUrl = window.__callWsUrl;
var myId  = window.__callMyId || '';
var lkSrc = window.__livekitSrc || 'https://cdn.jsdelivr.net/npm/livekit-client@2/+esm';

function report(cmd, data) {
  console.log('call:' + cmd + (data !== undefined ? ':' + String(data) : ''));
}

// Exposed for QML runJavaScript: window.__room.disconnect()
window.__room = null;

// Exposed for QML runJavaScript: window.setMicMuted(true/false)
window.setMicMuted = function(muted) {
  if (window.__room && window.__room.localParticipant) {
    window.__room.localParticipant.setMicrophoneEnabled(!muted).catch(function(){});
  }
};

if (!token || !wsUrl) {
  report('error', 'missing-params');
} else {
  try {
    const { Room, RoomEvent } = await import(lkSrc);

    var room = new Room({
      audioCaptureDefaults: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl:  true
      }
    });
    window.__room = room;

    function ensureAudio() {
      room.startAudio().then(function() {
        report('audioCtx', 'running');
      }).catch(function(e) {
        report('audioCtx', 'err:' + (e && e.message ? e.message : 'unknown'));
      });
    }

    room.on(RoomEvent.Connected, function() {
      report('connected');
      ensureAudio();
      room.localParticipant.setMicrophoneEnabled(true).catch(function(e) {
        report('error', 'mic:' + ((e && e.message) ? e.message : 'failed'));
      });
    });

    room.on(RoomEvent.AudioPlaybackStatusChanged, function() {
      if (!room.canPlaybackAudio) {
        report('audioCtx', 'suspended-retrying');
        ensureAudio();
      }
    });

    room.on(RoomEvent.Disconnected, function(reason) {
      report('disconnected', reason || '');
    });

    room.on(RoomEvent.Reconnecting, function() {
      report('reconnecting');
    });

    room.on(RoomEvent.Reconnected, function() {
      report('reconnected');
      ensureAudio();
      room.localParticipant.setMicrophoneEnabled(true).catch(function(){});
    });

    room.on(RoomEvent.TrackSubscribed, function(track) {
      if (track.kind === 'audio') {
        var el = track.attach();
        el.autoplay = true;
        el.volume = 1.0;
        document.body.appendChild(el);
        // Explicitly call play() — dynamically-created audio elements may
        // not start via autoplay attribute alone in embedded WebViews.
        el.play().then(function() {
          report('audio', 'playing');
        }).catch(function(e) {
          report('audio', 'play-blocked:' + (e && e.name ? e.name : 'unknown'));
          // Retry once after a short delay
          setTimeout(function() {
            el.play().then(function() {
              report('audio', 'play-retry-ok');
            }).catch(function(e2) {
              report('audio', 'play-retry-fail:' + (e2 && e2.name ? e2.name : 'unknown'));
            });
          }, 500);
        });
        ensureAudio();
        report('audio', 'subscribed');
        // Report AudioContext state for diagnostics
        if (room.audioContext) {
          report('audioCtx-state', room.audioContext.state);
        }
      }
    });

    room.on(RoomEvent.TrackUnsubscribed, function(track) {
      track.detach();
    });

    room.on(RoomEvent.ActiveSpeakersChanged, function(speakers) {
      var hasPeer = speakers.some(function(s) { return s.identity !== myId; });
      report('speaking', hasPeer ? '1' : '0');
    });

    await room.connect(wsUrl, token);

  } catch(err) {
    report('error', (err && err.message) ? err.message : 'load-failed');
  }
}
</script>
</body>
</html>
