version: '3.8'

services:
  im-agent-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: im-agent-hub
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据库（重建容器不丢数据）
      - im-hub-data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  im-hub-data:
